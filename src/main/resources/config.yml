SpawnManagementPlus:
  # Perform this action when a player is joining the server.
  on_server_join:
    enabled: false
    exclude: # Are there any worlds that should not do this?
      - world_nether
      - world_end
    action: # What is it that you want the server to do to the user: Teleport, Play Sound, Send message?
      sound:
        enabled: false
        type: minecraft:block.note_block.pling # You can find a list of sounds by running /playsound in game, and finding the name of the sound that you would like to play.
        volume: 1
        pitch: 1
      location: # This can be set in game using the command "/smp location server"
        world: world # if using multiple worlds, YOU MUST have a world loader.
        x: 0
        y: 0
        z: 0
        yaw: 0
        pitch: 0
      message_type: CHAT # Supports either CHAT or ACTION_BAR
      message: # Should the player receive a message? You can send multiple messages to the player. Supports Placeholder API. Supports Placeholder API. You can use [] to disable messages, e.g. message: []
        - ""
        - "&d&lWelcome to Survival %player_name%!"
        - "&bStarter Commands: ⁄ʜᴇʟᴘ ⁄ʀᴛᴘ ⁄ѕʜᴏᴘ ⁄ʜᴏᴍᴇѕ ⁄ᴀʜ"
        - ""

    # Should the server handle first joins differently?.
    only_on_first_time:
      enabled: false
      use_on_server_join_default: true # Overwrite the below settings to use the on_server_join defaults.
      action:
        sound:
          enabled: false
          type: minecraft:block.note_block.pling # You can find a list of sounds by running /playsound in game, and finding the name of the sound that you would like to play.
          volume: 1
          pitch: 1
        location:
          world: world # if using multiple worlds, YOU MUST have a world loader.
          x: 0
          y: 0
          z: 0
          yaw: 0
          pitch: 0
        message_type: CHAT # Supports either CHAT or ACTION_BAR
        message: # Should the player receive a message? You can send multiple messages to the player. Supports Placeholder API. Supports Placeholder API. You can use [] to disable messages, e.g. message: []
          - ""
          - "&d&lWelcome to Survival %player_name%!"
          - "&bStarter Commands: ⁄ʜᴇʟᴘ ⁄ʀᴛᴘ ⁄ѕʜᴏᴘ ⁄ʜᴏᴍᴇѕ ⁄ᴀʜ"
          - ""

  # When a player changes world, should they spawn at world spawn?
  on_world_join:
    enabled: false
    exclude: # Are there any worlds that should not do this?
      - "the_nether"
      - "the_end"
    action:
      sound:
        enabled: false
        type: minecraft:block.note_block.pling # You can find a list of sounds by running /playsound in game, and finding the name of the sound that you would like to play.
        volume: 1
        pitch: 1
      location: # Since it is only player rotation, there is no command for this.
        yaw: 0
        pitch: 0
      message_type: CHAT # Supports either CHAT or ACTION_BAR
      message: # Should the player receive a message? You can send multiple messages to the player. Supports Placeholder API. Supports Placeholder API. You can use [] to disable messages, e.g. message: []
        - ""
        - "&d&lWelcome to Survival %player_name%!"
        - "&bStarter Commands: ⁄ʜᴇʟᴘ ⁄ʀᴛᴘ ⁄ѕʜᴏᴘ ⁄ʜᴏᴍᴇѕ ⁄ᴀʜ"
        - ""

  # Perform this action when a player is respawning.
  on_respawn:
    enabled: false
    use_world_default_spawn_location: false # Should the respawn location use the world default? Will override on_respawn.action.location
    skip_respawn_screen: false # Should they be forced to click 'respawn' in the death screen?
    use_game_death: true # Will force the player to respawn, without faking player death. e.g. don't actually kill the player, teleport player to spawn, heal, drop items, etc. if true, this will cause the death screen to flash for a second and will allow other plugins to handle death correctly.
    spread_items_on_death: true # Only works when skip_respawn_screen is set to true and use_fake_death is false as use_fake_death=true allows the game to handle death itself.

    # Should the player spawn at a bed/anchor location if it is available?
    prefer_bed_location: false
    prefer_anchor_location: false

    action:
      sound:
        enabled: false
        type: minecraft:block.note_block.pling # You can find a list of sounds by running /playsound in game, and finding the name of the sound that you would like to play.
        volume: 1
        pitch: 1
      location: # if you use_world_default_spawn_location=false then location will get overwritten.
        world: world # if using multiple worlds, YOU MUST have a world loader.
        x: 0
        y: 0
        z: 0
        yaw: 0
        pitch: 0
      message_type: CHAT # Supports either CHAT or ACTION_BAR
      message: # Supports Placeholder API. You can use [] to disable messages, e.g. message: []
        [ ]
  commands:
    spawn:
      enabled: false
      insufficient_permission_error_message: "&cYou do not have permission to run this command."
      you_are_already_teleporting: "&cYou can not use this right now!"
      use_on_server_join_location: true # Should the location in SpawnManagementPlus.on_server_join.action.location be used?
      location: # Can be set by doing "/smp location set spawn_cmd" This location will not be used if you use_on_server_join_location=true
        # Gets overwritten if you use_on_server_join_location=true
        world: world # if using multiple worlds, YOU MUST have a world loader.
        x: 0
        y: 0
        z: 0
        yaw: 0
        pitch: 0

      # Should the spawn command, use a countdown? This is useful for pvp/pve environments where you don't want the player to prevent death by teleporting away.
      cooldown_timer:
        seconds: -1 # -1 to disable. How long should the timer be?

        # What should happen while the timer is counting down?
        on_interval:
          sound:
            enabled: false
            type: minecraft:block.note_block.pling # You can find a list of sounds by running /playsound in game, and finding the name of the sound that you would like to play.
            volume: 1.0
            pitch: 1.0
          message_type: ACTION_BAR # Supports either CHAT or ACTION_BAR
          message: # Should the player receive a message? You can send multiple messages to the player. Supports Placeholder API. Supports Placeholder API. You can use [] to disable messages, e.g. message: []
            - "&aTeleporting in %smp_second%!"

        # What should happen when the player successfully teleports?
        on_teleport:
          sound:
            enabled: false
            type: minecraft:block.note_block.pling # You can find a list of sounds by running /playsound in game, and finding the name of the sound that you would like to play.
            volume: 1.0
            pitch: 1.0
          message_type: CHAT # Supports either CHAT or ACTION_BAR
          message: # Should the player receive a message? You can send multiple messages to the player. Supports Placeholder API. Supports Placeholder API. You can use [] to disable messages, e.g. message: []
            - "&aTeleporting..."

        # What should happen when the player moves while the timer is active?
        on_move:
          cancel: true # Cancel the timer when the player moves?
          sound:
            enabled: false
            type: minecraft:block.note_block.pling # You can find a list of sounds by running /playsound in game, and finding the name of the sound that you would like to play.
            volume: 1.0
            pitch: 1.0
          message_type: CHAT # Supports either CHAT or ACTION_BAR
          message: # Should the player receive a message? You can send multiple messages to the player. Supports Placeholder API. Supports Placeholder API. You can use [] to disable messages, e.g. message: []
            - ""
            - "&cYou moved! Teleport cancelled."
            - ""

    # Smp command error messages.
    smp:
      insufficient_permission_error_message: "&cYou do not have permission to run this command."
      saved_data_message: "&aLocation was saved successfully"
      saved_data_failed_message: "&cLocation save failed!"
